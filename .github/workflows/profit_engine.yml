name: Mondial — Profit Engine (Sniper Protocol)

on:
  schedule:
    # 08:30 UTC = 11:30 IDT — after main pipeline resets odds and you've had
    # time to fill winner_odds.json with today's bookmaker prices.
    - cron: "30 8 * * *"

  workflow_dispatch:
    inputs:
      bankroll:
        description: "Bankroll in NIS (default 100)"
        required: false
        default: "100"
      min_prob:
        description: "Minimum model probability 0-1 (default 0.50 = 50% — no longshots)"
        required: false
        default: "0.50"
      ds_min:
        description: "Minimum Decision Score threshold (default 70)"
        required: false
        default: "70"
      ev_min:
        description: "Minimum EV threshold e.g. 0.10 = 10% (default 0.10)"
        required: false
        default: "0.10"

concurrency:
  group: profit-engine
  cancel-in-progress: false

jobs:
  run-profit-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the report back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install numpy requests

      - name: Run Profit Engine
        env:
          GREEN_API_INSTANCE_ID:   ${{ secrets.GREEN_API_INSTANCE_ID }}
          GREEN_API_TOKEN:         ${{ secrets.GREEN_API_TOKEN }}
          WHATSAPP_RECIPIENT_PHONE: ${{ secrets.WHATSAPP_RECIPIENT_PHONE }}
        run: |
          python scripts/profit_engine.py \
            --bankroll ${{ github.event.inputs.bankroll  || '100'  }} \
            --min-prob ${{ github.event.inputs.min_prob  || '0.50' }} \
            --ds-min   ${{ github.event.inputs.ds_min    || '70'   }} \
            --ev-min   ${{ github.event.inputs.ev_min    || '0.10' }} \
            --output   data/profit_report.json \
            --notify

      - name: Commit report to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/profit_report.json
          if git diff --staged --quiet; then
            echo "Report unchanged — no commit needed."
          else
            git commit -m "chore: profit engine report $(date -u '+%Y-%m-%d') [skip ci]"
            git push
            echo "Report pushed to repository."
          fi
