name: Mondial Predictor — Daily Run

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "30 6 * * *"
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Bypass last_run.json guard and re-process today"
        required: false
        default: "true"
        type: boolean
      dry_run:
        description: "Dry run — skip all live API calls"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: mondial-daily-run
  cancel-in-progress: false

jobs:
  run-predictor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests anthropic numpy

      - name: Fetch World Cup schedule
        if: github.event.inputs.dry_run != 'true'
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/fetch_schedule.py --output tests/sample_games.json

      - name: Sync group tables
        if: github.event.inputs.dry_run != 'true'
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          if [ -n "$FOOTBALL_DATA_API_KEY" ]; then
            python scripts/sync_tables.py --output data/group_tables.json
          else
            python scripts/sync_tables.py --from-schedule tests/sample_games.json --output data/group_tables.json
          fi

      - name: Reset winner_odds.json to today's matches
        if: github.event.inputs.dry_run != 'true'
        run: python scripts/master_reset.py

      - name: Run predictor and send notification
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SCORE365_AUTH_COOKIE: ${{ secrets.SCORE365_AUTH_COOKIE }}
          GREEN_API_INSTANCE_ID: ${{ secrets.GREEN_API_INSTANCE_ID }}
          GREEN_API_TOKEN: ${{ secrets.GREEN_API_TOKEN }}
          WHATSAPP_RECIPIENT_PHONE: ${{ secrets.WHATSAPP_RECIPIENT_PHONE }}
        run: |
          FORCE_FLAG=""
          [ "${{ github.event.inputs.force || 'false' }}" = "true" ] && FORCE_FLAG="--force"
          DRY_FLAG=""
          [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ] && DRY_FLAG="--dry-run"
          python main.py tests/sample_games.json $FORCE_FLAG $DRY_FLAG

      - name: Auto-commit all updated data files
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git commit -m "chore: update picks and history [skip ci]"
            git push
          fi

      - name: Keepalive
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p .github
          echo "Last keepalive: $(date -u '+%Y-%m-%dT%H:%M:%SZ') run=${{ github.run_id }}" > .github/keepalive.txt
          git add .github/keepalive.txt
          git diff --staged --quiet || git commit -m "chore: keepalive $(date -u '+%Y-%m-%d') [skip ci]"
          git push
