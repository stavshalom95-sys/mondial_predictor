name: Mondial Predictor — Daily Run

on:
  schedule:
    # Primary: 06:00 UTC = 09:00 IDT (summer, UTC+3).
    # WC 2026 latest games (21:00 PDT = 00:00 UTC) finish by ~02:00 UTC,
    # giving a 4-hour safety margin before this run fetches results.
    - cron: "0 6 * * *"
    # Backup: 07:00 UTC — fires if GitHub skips the 06:00 slot.
    # last_run.json guard ensures the pipeline runs only once per day.
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Bypass last_run.json guard and re-process today"
        required: false
        default: "true"
        type: boolean
      dry_run:
        description: "Dry run — skip all live API calls; test history ingestion + matching only (no notification, no state changes)"
        required: false
        default: "false"
        type: boolean

# Prevent two scheduled runs from executing simultaneously.
# last_run.json ensures idempotency if both crons happen to fire.
concurrency:
  group: mondial-daily-run
  cancel-in-progress: false

jobs:
  run-predictor:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit morning_picks.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Fetch World Cup schedule
        # Skipped in dry-run mode — uses the tests/sample_games.json already in the repo.
        if: github.event.inputs.dry_run != 'true'
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/fetch_schedule.py --output tests/sample_games.json

      - name: Run predictor and send notification
        env:
          THE_ODDS_API_KEY:         ${{ secrets.THE_ODDS_API_KEY }}
          RAPIDAPI_KEY:             ${{ secrets.RAPIDAPI_KEY }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          SCORE365_AUTH_COOKIE:     ${{ secrets.SCORE365_AUTH_COOKIE }}
          GREEN_API_INSTANCE_ID:    ${{ secrets.GREEN_API_INSTANCE_ID }}
          GREEN_API_TOKEN:          ${{ secrets.GREEN_API_TOKEN }}
          WHATSAPP_RECIPIENT_PHONE: ${{ secrets.WHATSAPP_RECIPIENT_PHONE }}
        run: |
          FORCE_FLAG=""
          [ "${{ github.event.inputs.force || 'false' }}" = "true" ] && FORCE_FLAG="--force"
          DRY_FLAG=""
          [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ] && DRY_FLAG="--dry-run"
          python main.py tests/sample_games.json $FORCE_FLAG $DRY_FLAG

      - name: Commit morning picks and history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p data
          if [ -f data/morning_picks.json ] || [ -f data/history.json ]; then
            git add data/
            git diff --staged --quiet || git commit -m "chore: update picks and history [skip ci]"
            git push
          else
            echo "No data files produced this run — nothing to commit."
          fi
