name: Mondial Predictor — Daily Run

on:
  schedule:
    # 05:00 UTC = 08:00 IDT (summer, UTC+3).
    # In winter (UTC+2) change to "0 6 * * *" for 08:00 IDT.
    - cron: "0 5 * * *"
  workflow_dispatch: {}   # allow manual trigger from the Actions tab

jobs:
  run-predictor:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit morning_picks.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Fetch World Cup schedule
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/fetch_schedule.py --output tests/sample_games.json

      - name: Run predictor and send notification
        env:
          THE_ODDS_API_KEY:         ${{ secrets.THE_ODDS_API_KEY }}
          RAPIDAPI_KEY:             ${{ secrets.RAPIDAPI_KEY }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          SCORE365_AUTH_COOKIE:     ${{ secrets.SCORE365_AUTH_COOKIE }}
          GREEN_API_INSTANCE_ID:    ${{ secrets.GREEN_API_INSTANCE_ID }}
          GREEN_API_TOKEN:          ${{ secrets.GREEN_API_TOKEN }}
          WHATSAPP_RECIPIENT_PHONE: ${{ secrets.WHATSAPP_RECIPIENT_PHONE }}
        run: python main.py tests/sample_games.json

      - name: Commit morning picks and history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/morning_picks.json data/history.json
          git diff --staged --quiet || git commit -m "chore: update picks and history [skip ci]"
          git push
